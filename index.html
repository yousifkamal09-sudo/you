<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جغرافيا الأفكار والذكريات - AR</title>
    
    <!-- تضمين مكتبة A-Frame ومكتبة AR.js الخاصة بالموقع الجغرافي -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        /* واجهة مستخدم بسيطة تظهر فوق الكاميرا */
        .ui-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: Arial, sans-serif;
            text-align: center;
            pointer-events: none;
            direction: rtl;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- واجهة المستخدم الإرشادية -->
    <div class="ui-overlay">
        <p style="margin: 0; font-size: 16px; font-weight: bold;">ابحث حولك لرؤية ذكريات الآخرين المعلقة في الهواء...</p>
    </div>

    <!-- مشهد الواقع المعزز -->
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- الكاميرا التي تتبع الموقع الجغرافي للمستخدم وحركة الهاتف -->
        <a-camera gps-camera rotation-reader></a-camera>

        <!-- 
            الفقاعة الفكرية (النص ثلاثي الأبعاد):
            ملاحظة: يمكنك لاحقاً تغيير latitude و longitude إلى إحداثيات موقعك بدقة ليظهر النص في مكانك تماماً.
        -->
        <a-text
            value="Here stood a dreamer who left a text..."
            look-at="[gps-camera]"
            scale="15 15 15"
            align="center"
            color="#FFD700"
            gps-entity-place="latitude: 24.7136; longitude: 46.6753;">
            
            <!-- مجسم كروي خلف النص ليعطي إيحاء الفقاعة المعلقة -->
            <a-sphere radius="0.5" material="color: #007bff; opacity: 0.6; transparent: true;" position="0 0 -0.1"></a-sphere>
        </a-text>

    </a-scene>

    <script>
        window.addEventListener('load', () => {
            console.log("تطبيق جغرافيا الذكريات جاهز للعمل!");
        });
    </script>
</body>
</html>
