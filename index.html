<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>منصة جغرافيا الخواطر - الأقمار الصناعية</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* زر الغرز العائم فوق الكاميرا */
        .controls-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #2c1d11 0%, #110a05 100%);
            color: #d4a373;
            border: 1px solid rgba(212, 163, 115, 0.5);
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }

        /* نافذة الغرز عن بعد والخريطة */
        .panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 12, 8, 0.98);
            z-index: 10000;
            display: none;
            flex-direction: column;
            color: #f5ebe0;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-header h2 {
            color: #d4a373;
            margin: 0 0 5px 0;
            font-size: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 13px;
            color: #d4a373;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(212, 163, 115, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* حاوية خريطة القمر الصناعي بالمباني */
        #map {
            width: 100%;
            height: 250px;
            border-radius: 8px;
            border: 1px solid #d4a373;
            margin-top: 5px;
        }

        .submit-btn {
            background: linear-gradient(90deg, #d4a373, #b58353);
            color: #120c08;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 15px;
            width: 100%;
        }

        .close-panel {
            background: none;
            border: none;
            color: #e63946;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <button class="action-btn" onclick="openPlantPanel()">📍 خيار الغرز عن بُعد</button>
    </div>

    <div id="plant-panel" class="panel">
        <div class="panel-header">
            <h2>الغرز عن بُعد (خرائط المباني)</h2>
            <div style="font-size: 12px; color: #b7a89a; text-align: center; margin-bottom: 15px;">حدد المبنى أو الشارع بدقة واكتب بوحك الأدبي</div>
        </div>

        <div class="input-group">
            <label>ما اسمك؟</label>
            <input type="text" id="v-name" placeholder="أدخل اسمك الكريم...">
        </div>

        <div class="input-group">
            <label>كم عمرك؟</label>
            <input type="number" id="v-age" placeholder="أدخل عمرك...">
        </div>

        <div class="input-group">
            <label>هل تعرف يوسف كمال السراج؟</label>
            <select id="v-know">
                <option value="" disabled selected>اختر إجابة...</option>
                <option value="yes">نعم، أعرفه جيداً</option>
                <option value="maybe">سمعت عنه</option>
                <option value="no">لا، لم أتشرف بعد</option>
            </select>
        </div>

        <div class="input-group">
            <label>اكتب خاطرتك المكانية:</label>
            <textarea id="v-thought" placeholder="ماذا تترك في هذا الحيز من ذاكرة؟..."></textarea>
        </div>

        <div class="input-group">
            <label>كبّر الخريطة واضغط على المبنى المحدد بدقة للغرز:</label>
            <div id="map"></div>
            <div id="coords-display" style="font-size: 11px; color: #d4a373; margin-top: 6px; text-align: right;">الموقع: حرك الخريطة واضغط لتحديد مكان المبنى</div>
        </div>

        <button class="submit-btn" onclick="plantMemory()">✨ إتمام الغرز الجغرافي للمبنى</button>
        <button class="close-panel" onclick="closePlantPanel()">إلغاء والعودة للكاميرا</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false;">
        
        <a-marker preset="hiro" id="ar-marker">
            <a-entity position="0 0 0" rotation="-90 0 0">
                <a-plane color="#1e120b" opacity="0.95" width="4" height="2.6" radius="0.15" shader="flat"></a-plane>
                <a-text id="ar-text-content" value="" font="https://cdn.aframe.io/fonts/A-Bold.fnt" align="center" position="0 0.4 0.02" width="3.5" color="#f5ebe0" wrap-count="24"></a-text>
                <a-plane color="#d4a373" width="3.2" height="0.015" position="0 -0.4 0.03"></a-plane>
                <a-text id="ar-author-name" value="" font="https://cdn.aframe.io/fonts/A-Bold.fnt" align="center" position="0 -0.7 0.02" width="2.5" color="#e63946"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let map;
        let selectedMarker = null;
        let selectedCoords = null;

        // دالة تشغيل خريطة الأقمار الصناعية والمباني بدقة عالية جداً
        function initMap() {
            if (map) return; 
            
            // فتح الخريطة مسبقاً على إحداثيات متوسطة تقريبية
            map = L.map('map').setView([15.6000, 32.5333], 16); 

            // استخدام سيرفر Esri الفضائي لعرض المباني والبيوت بدقة واضحة جداً عند التكبير
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            }).addTo(map);

            map.on('click', function(e) {
                let lat = e.latlng.lat;
                let lng = e.latlng.lng;
                selectedCoords = { lat: lat, lng: lng };

                if (selectedMarker) {
                    selectedMarker.setLatLng(e.latlng);
                } else {
                    selectedMarker = L.marker(e.latlng).addTo(map);
                }

                document.getElementById('coords-display').innerText = `تم تحديد المبنى بنجاح بإحداثيات دقيقة.`;
            });
        }

        function openPlantPanel() {
            document.getElementById('plant-panel').style.display = 'flex';
            setTimeout(function() {
                initMap();
                map.invalidateSize();
            }, 250);
        }

        function closePlantPanel() {
            document.getElementById('plant-panel').style.display = 'none';
        }

        function wrapText(text, maxChars) {
            let words = text.split(' ');
            let lines = [];
            let currentLine = '';
            words.forEach(word => {
                if ((currentLine + word).length > maxChars) {
                    lines.push(currentLine.trim());
                    currentLine = word + ' ';
                } else {
                    currentLine += word + ' ';
                }
            });
            lines.push(currentLine.trim());
            return lines.join('\n');
        }

        function plantMemory() {
            const name = document.getElementById('v-name').value;
            const age = document.getElementById('v-age').value;
            const know = document.getElementById('v-know').value;
            const thought = document.getElementById('v-thought').value;

            if (!name || !age || !know || !thought || !selectedCoords) {
                alert("لطفاً، أجب على الأسئلة وحدد المبنى بدقة عبر النقر على الخريطة أولاً.");
                return;
            }

            const formattedThought = wrapText(thought, 23);

            // تحديث لوحة العرض ثلاثية الأبعاد الفورية
            document.getElementById('ar-text-content').setAttribute('value', formattedThought);
            document.getElementById('ar-author-name').setAttribute('value', 'بقلم: ' + name);

            alert("تم الغرز عن بُعد بنجاح للمبنى المختار ومزامنة الخاطرة في الفضاء!");
            closePlantPanel();
        }
    </script>
</body>
</html>
