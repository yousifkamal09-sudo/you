<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>جغرافيا الأفكار والذكريات المفقودة</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* الخطوط والتنسيق العام */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* 1. شاشة الترحيب والتهيئة */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a2e, #16213e);
            color: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.8s ease;
        }
        #splashScreen h1 {
            font-size: 28px;
            color: #ffdf00;
            margin-bottom: 10px;
        }
        #splashScreen p {
            font-size: 16px;
            max-width: 400px;
            line-height: 1.6;
            color: #e2e2e2;
            direction: rtl;
        }
        #startButton {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
            transition: transform 0.2s;
        }
        #startButton:active {
            transform: scale(0.95);
        }

        /* 2. لوحة التحكم السفلية لإسقاط الذكريات */
        .control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(15, 12, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 24px;
            width: 88%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
            direction: rtl;
            box-sizing: border-box;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-panel input {
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #111;
        }
        
        /* أزرار التحكم السفلى */
        .button-group {
            display: flex;
            gap: 10px;
        }
        #dropButton {
            flex: 2;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(40,167,69,0.3);
            transition: all 0.2s;
        }
        #copyButton {
            flex: 1;
            background: linear-gradient(135deg, #17a2b8, #117a8b);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(23,162,184,0.3);
            transition: all 0.2s;
        }
        .control-panel button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div style="font-size: 60px; margin-bottom: 15px;">📍</div>
        <h1>جغرافيا الأفكار والذكريات</h1>
        <p>مرحباً بك في الفضاء التفاعلي المعزز. يرجى التأكد من تشغيل الموقع الجغرافي (GPS) لتتمكن من زرع كلماتك ورؤية ما تركه الآخرون معلقاً في الهواء حولك.</p>
        <button id="startButton">ابدأ التجربة الآن</button>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="authorName" placeholder="اسمك المستعار (اختياري)...">
            <input type="text" id="memoryText" placeholder="اكتب فكرة أو خاطرة لتتركها في هذا الفضاء...">
        </div>
        <div class="button-group">
            <button id="dropButton">📍 اغرس الأثر</button>
            <button id="copyButton">🔗 نسخ الرابط</button>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        
        <a-camera gps-camera rotation-reader></a-camera>
        <a-entity id="memoriesContainer"></a-entity>

    </a-scene>

    <script>
        // إخفاء شاشة الترحيب عند الضغط على زر البداية وتفعيل الكاميرا
        document.getElementById('startButton').addEventListener('click', () => {
            const splash = document.getElementById('splashScreen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        });

        const dropButton = document.getElementById('dropButton');
        const copyButton = document.getElementById('copyButton');
        const memoryInput = document.getElementById('memoryText');
        const authorInput = document.getElementById('authorName');
        const container = document.getElementById('memoriesContainer');

        // ميزة زر نسخ الرابط تلقائياً
        copyButton.addEventListener('click', () => {
            const currentUrl = window.location.href; // سحب رابط الموقع الحالي ديناميكياً
            navigator.clipboard.writeText(currentUrl).then(() => {
                alert('📋 تم نسخ رابط تطبيقك بنجاح! يمكنك الآن إرساله لأصدقائك ليشاركونك ذكرياتهم.');
            }).catch(err => {
                alert('فشل النسخ التلقائي، يمكنك نسخ الرابط يدوياً من أعلى المتصفح.');
            });
        });

        // ميزة غرس الذكرى بالواقع المعزز والموقع الجغرافي
        dropButton.addEventListener('click', () => {
            const textValue = memoryInput.value.trim();
            const authorValue = authorInput.value.trim() || 'عابر سبيل';

            if (!textValue) {
                alert('الرجاء كتابة الفكرة أو الخاطرة أولاً!');
                return;
            }

            navigator.geolocation.getCurrentPosition((position) => {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;

                const fullDisplayTrack = `"${textValue}" \n [ ${authorValue} ]`;

                const newTextEntity = document.createElement('a-text');
                newTextEntity.setAttribute('value', fullDisplayTrack);
                newTextEntity.setAttribute('align', 'center');
                newTextEntity.setAttribute('color', '#FFD700'); 
                newTextEntity.setAttribute('scale', '30 30 30'); 
                newTextEntity.setAttribute('look-at', '[gps-camera]'); 
                
                newTextEntity.setAttribute('gps-entity-place', `latitude: ${currentLat}; longitude: ${currentLng};`);

                const sphere = document.createElement('a-sphere');
                sphere.setAttribute('radius', '1.2');
                sphere.setAttribute('material', 'color: #0d6efd; opacity: 0.4; transparent: true; roughness: 0.2;');
                sphere.setAttribute('position', '0 0 -0.3');
                
                newTextEntity.appendChild(sphere);
                container.appendChild(newTextEntity);

                memoryInput.value = '';
                authorInput.value = '';
                
                alert('🚀 مبروك! تم غرس ذكراك بنجاح في فضاء هذا الموقع. التفت حولك بزاوية 360 درجة لتبصرها معلقة في الهواء.');

            }, (error) => {
                alert('⚠️ تعذر قراءة مستشعر الموقع الجغرافي. تأكد من تفعيل الـ GPS في هاتفك وإعطاء المتصفح كامل الصلاحيات.');
            }, {
                enableHighAccuracy: true
            });
        });
    </script>
</body>
</html>
