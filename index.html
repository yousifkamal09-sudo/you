<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>منصة جغرافيا الخواطر - البث المباشر</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* الكاميرا الخلفية الحية */
        #webcam-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* اللوحة ثلاثية الأبعاد العائمة التي تتأثر بالمسافة (تكبر وتصغر) */
        #ar-overlay-card {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 5;
            background: rgba(30, 18, 11, 0.95);
            border: 2px solid #d4a373;
            border-radius: 15px;
            padding: 20px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            display: none;
            color: #f5ebe0;
            transition: transform 0.5s ease-out; /* حركة ناعمة أثناء التكبير والتصغير */
        }

        #ar-overlay-card p {
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 15px 0;
            word-wrap: break-word;
        }

        #ar-overlay-card .author {
            color: #e63946;
            font-weight: bold;
            font-size: 14px;
        }

        /* عرض المسافة الحالية أسفل لوحة البوح */
        .distance-tag {
            font-size: 11px;
            color: #b7a89a;
            margin-top: 8px;
        }

        /* الأزرار العائمة أسفل الشاشة */
        .controls-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 92%;
            max-width: 440px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            background: linear-gradient(135deg, #2c1d11 0%, #110a05 100%);
            color: #d4a373;
            border: 1px solid rgba(212, 163, 115, 0.6);
            padding: 14px 8px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        /* نافذة الغرز والأسئلة */
        .panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 12, 8, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            color: #f5ebe0;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-header h2 {
            color: #d4a373;
            margin: 0 0 5px 0;
            font-size: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 13px;
            color: #d4a373;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(212, 163, 115, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            font-size: 14px;
        }

        #map {
            width: 100%;
            height: 220px;
            border-radius: 8px;
            border: 1px solid #d4a373;
            margin-top: 5px;
        }

        .submit-btn {
            background: linear-gradient(90deg, #d4a373, #b58353);
            color: #120c08;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 15px;
            width: 100%;
        }

        .close-panel {
            background: none;
            border: none;
            color: #e63946;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <video id="webcam-video" autoplay playsinline muted></video>

    <div id="ar-overlay-card">
        <p id="ar-text-view"></p>
        <div style="width: 80%; height: 1px; background: #d4a373; margin: 10px auto;"></div>
        <div id="ar-author-view" class="author"></div>
        <div id="ar-distance-view" class="distance-tag">المسافة: جاري الحساب...</div>
    </div>

    <div class="controls-container">
        <button class="action-btn" onclick="openPlantPanel('current')">📍 الغرز في موقعي الحالي</button>
        <button class="action-btn" onclick="openPlantPanel('remote')">🗺️ الغرز عن بُعد / بالإحداثيات</button>
    </div>

    <div id="plant-panel" class="panel">
        <div class="panel-header">
            <h2 id="panel-main-title">غرز ذاكرة مكانية</h2>
            <div style="font-size: 12px; color: #b7a89a; text-align: center; margin-bottom: 15px;">اكتب بوحك الأدبي ليرتبط بالحيز الجغرافي</div>
        </div>

        <div class="input-group">
            <label>ما اسمك؟</label>
            <input type="text" id="v-name" placeholder="أدخل اسمك الكريم...">
        </div>

        <div class="input-group">
            <label>كم عمرك؟</label>
            <input type="number" id="v-age" placeholder="أدخل عمرك...">
        </div>

        <div class="input-group">
            <label>هل تعرف يوسف كمال السراج؟</label>
            <select id="v-know">
                <option value="" disabled selected>اختر إجابة...</option>
                <option value="yes">نعم، أعرفه جيداً</option>
                <option value="maybe">سمعت عنه</option>
                <option value="no">لا، لم أتشرف بعد</option>
            </select>
        </div>

        <div class="input-group">
            <label>اكتب خاطرتك المكانية:</label>
            <textarea id="v-thought" placeholder="ماذا تترك في هذا الحيز من ذاكرة؟..."></textarea>
        </div>

        <div class="input-group" id="manual-coords-group">
            <label>أو الصق إحداثيات الموقع هنا مباشرة (خط الطول والعرض):</label>
            <input type="text" id="manual-coords-input" oninput="parseManualCoords()" placeholder="مثال: 15.6000, 32.5333">
        </div>

        <div class="input-group" id="map-container-group">
            <label>أو كبّر الخريطة واضغط على المبنى/المحل المسمّى بدقة:</label>
            <div id="map"></div>
            <div id="coords-display" style="font-size: 11px; color: #d4a373; margin-top: 6px; text-align: right;">الموقع: اضغط لتحديد مكان المبنى المطلوب</div>
        </div>

        <button class="submit-btn" onclick="plantMemory()">✨ إتمام الغرز الجغرافي</button>
        <button class="close-panel" onclick="closePlantPanel()">إلغاء والعودة للكاميرا</button>
    </div>

    <script>
        let map;
        let selectedMarker = null;
        let selectedCoords = null;
        let currentMode = 'remote';
        let watchId = null; // لمراقبة حركة المستخدم وتحديث الحجم حياً

        function startWebcam() {
            const video = document.getElementById('webcam-video');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } }
                })
                .then(function(stream) { video.srcObject = stream; })
                .catch(function(error) {
                    navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) { video.srcObject = stream; });
                });
            }
        }

        window.addEventListener('DOMContentLoaded', startWebcam);

        function initMap() {
            if (map) return; 
            map = L.map('map').setView([15.6000, 32.5333], 15); 

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            }).addTo(map);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            }).addTo(map);

            map.on('click', function(e) {
                updateSelectedLocation(e.latlng.lat, e.latlng.lng, true);
            });
        }

        function updateSelectedLocation(lat, lng, updateMapCenter = false) {
            selectedCoords = { lat: lat, lng: lng };
            const latlng = L.latLng(lat, lng);

            if (selectedMarker) {
                selectedMarker.setLatLng(latlng);
            } else {
                selectedMarker = L.marker(latlng).addTo(map);
            }

            if (updateMapCenter) {
                map.setView(latlng, map.getZoom());
            }

            document.getElementById('coords-display').innerText = `تم تحديد الموقع: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        }

        function parseManualCoords() {
            const val = document.getElementById('manual-coords-input').value;
            const parts = val.split(',');
            if (parts.length === 2) {
                const lat = parseFloat(parts[0].trim());
                const lng = parseFloat(parts[1].trim());
                if (!isNaN(lat) && !isNaN(lng)) {
                    updateSelectedLocation(lat, lng, true);
                }
            }
        }

        function openPlantPanel(mode) {
            currentMode = mode;
            document.getElementById('plant-panel').style.display = 'flex';
            
            if (mode === 'current') {
                document.getElementById('panel-main-title').innerText = "غرز في موقعي الحالي";
                document.getElementById('map-container-group').style.display = 'none';
                document.getElementById('manual-coords-group').style.display = 'none';
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        selectedCoords = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                    }, function(err) {
                        alert("فشل جلب الموقع الحالي، تأكد من تفعيل الـ GPS.");
                    });
                }
            } else {
                document.getElementById('panel-main-title').innerText = "الغرز عن بُعد وبأسماء المواقع";
                document.getElementById('map-container-group').style.display = 'block';
                document.getElementById('manual-coords-group').style.display = 'block';
                setTimeout(function() {
                    initMap();
                    map.invalidateSize();
                }, 250);
            }
        }

        function closePlantPanel() {
            document.getElementById('plant-panel').style.display = 'none';
            document.getElementById('manual-coords-input').value = "";
        }

        // دالة حساب المسافة الدقيقة بين نقطتين جغرافيين (معادلة هافرسين الجغرافية)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // نصف قطر الأرض بالمتر
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // المسافة بالمتر
        }

        // دالة مراقبة المسافة وتعديل حجم اللوحة ديناميكياً
        function trackDistanceToMemory(targetLat, targetLng) {
            if (watchId) navigator.geolocation.clearWatch(watchId);

            watchId = navigator.geolocation.watchPosition(function(position) {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;

                // حساب المسافة الحالية بالمتر
                const distance = calculateDistance(currentLat, currentLng, targetLat, targetLng);
                document.getElementById('ar-distance-view').innerText = `المسافة الحالية: ${distance.toFixed(1)} متر`;

                // تطبيق لوغاريتم التكبير والتصغير ديناميكياً بناءً على القرب والبعد
                // النطاق المؤثر: من 0 متر إلى 100 متر
                let scaleFactor = 1;
                if (distance > 100) {
                    scaleFactor = 0.2; // تصبح صغيرة جداً إذا كان بعيداً جداً
                } else {
                    // كلما قلّت المسافة من 100 إلى 0، يكبر حجم الحجم من 0.2 إلى 1.3
                    scaleFactor = 1.3 - (distance / 100);
                    if (scaleFactor < 0.2) scaleFactor = 0.2;
                }

                // تطبيق التعديل على الكارت الحجمي فورا
                document.getElementById('ar-overlay-card').style.transform = `translate(-50%, -50%) scale(${scaleFactor})`;

            }, function(err) {
                console.log("خطأ في تتبع المسافة الحية.");
            }, { enableHighAccuracy: true });
        }

        function plantMemory() {
            const name = document.getElementById('v-name').value;
            const age = document.getElementById('v-age').value;
            const know = document.getElementById('v-know').value;
            const thought = document.getElementById('v-thought').value;

            if (!name || !age || !know || !thought || !selectedCoords) {
                alert("لطفاً، أكمل البيانات وحدد الموقع الجغرافي لإتمام الغرز.");
                return;
            }

            document.getElementById('ar-text-view').innerText = thought;
            document.getElementById('ar-author-view').innerText = 'بقلم: ' + name;
            document.getElementById('ar-overlay-card').style.display = 'block';

            // البدء في تتبع حركة الهاتف وتعديل حجم لوحة البوح حياً بناءً على الإحداثيات المغروزة
            trackDistanceToMemory(selectedCoords.lat, selectedCoords.lng);

            alert("تم الغرز بنجاح! اللوحة ستكبر وتصغر الآن ديناميكياً حسب اقترابك أو ابتعادك عن النقطة جغرافياً.");
            closePlantPanel();
        }
    </script>
</body>
</html>
