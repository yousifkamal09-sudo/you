        body, html {

        /* شاشة إدخال البيانات والأسئلة */
        #setup-screen {

            top: 0;

            width: 100%;
            height: 100%;

            justify-content: center;
            color: #f5ebe0;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 163, 115, 0.2);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

            font-size: 22px;
            margin-top: 0;
            margin-bottom: 5px;
        }
