<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>جغرافيا الأفكار والذكريات - نسخة تجريبية</title>
    
    <!-- استدعاء نسخ مستقرة من مكتبات A-Frame و AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* شاشة الترحيب */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a2e, #16213e);
            color: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.8s ease;
        }
        #splashScreen h1 {
            font-size: 26px;
            color: #ffdf00;
            margin-bottom: 10px;
        }
        #startButton {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }

        /* لوحة التحكم السفلية */
        .control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(15, 12, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 24px;
            width: 88%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
            direction: rtl;
            box-sizing: border-box;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-panel input {
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #111;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        #dropButton {
            flex: 2;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        #copyButton {
            flex: 1;
            background: linear-gradient(135deg, #17a2b8, #117a8b);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div style="font-size: 50px; margin-bottom: 15px;">🚀</div>
        <h1>النسخة التجريبية للمحاكاة الداخلية</h1>
        <p>تم تفعيل وتأمين ميزة نسخ الرابط لتضمن مشاركته بسهولة. اكتب خاطرتك وعاينها فوراً داخل غرفتك.</p>
        <button id="startButton">ابدأ المعاينة الفورية</button>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="authorName" placeholder="اسمك المستعار (اختياري)...">
            <input type="text" id="memoryText" placeholder="اكتب فكرة لتراها معلقة أمامك الآن...">
        </div>
        <div class="button-group">
            <button id="dropButton">✨ غرس ومعاينة فورية</button>
            <button id="copyButton">🔗 نسخ الرابط</button>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        
        <a-camera rotation-reader></a-camera>
        <a-entity id="memoriesContainer"></a-entity>

    </a-scene>

    <script>
        document.getElementById('startButton').addEventListener('click', () => {
            const splash = document.getElementById('splashScreen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        });

        const dropButton = document.getElementById('dropButton');
        const copyButton = document.getElementById('copyButton');
        const memoryInput = document.getElementById('memoryText');
        const authorInput = document.getElementById('authorName');
        const container = document.getElementById('memoriesContainer');

        // البرمجة المحدثة والمؤمنة لزر نسخ الرابط بنجاح
        copyButton.addEventListener('click', () => {
            const currentUrl = window.location.href;

            // الطريقة الأولى الحديثة
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentUrl).then(() => {
                    alert('📋 تم نسخ الرابط بنجاح لمشاركته!');
                }).catch(() => {
                    fallbackCopy(currentUrl); // الانتقال للخطة البديلة في حال الرفض
                });
            } else {
                fallbackCopy(currentUrl); // الخطة البديلة للهواتف الأقدم
            }
        });

        // دالة النسخ الاحتياطية المضمونة
        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";  // تجنب التمرير
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert('📋 تم نسخ الرابط بنجاح!');
            } catch (err) {
                alert('عذراً، قم بنسخ الرابط يدوياً من أعلى المتصفح.');
            }
            document.body.removeChild(textArea);
        }

        // غرس الخاطرة وعرضها فوراً أمام المستخدم
        dropButton.addEventListener('click', () => {
            const textValue = memoryInput.value.trim();
            const authorValue = authorInput.value.trim() || 'عابر سبيل';

            if (!textValue) {
                alert('الرجاء كتابة نص أولاً!');
                return;
            }

            const fullDisplayTrack = `"${textValue}" \n [ ${authorValue} ]`;

            const newTextEntity = document.createElement('a-text');
            newTextEntity.setAttribute('value', fullDisplayTrack);
            newTextEntity.setAttribute('align', 'center');
            newTextEntity.setAttribute('color', '#FFD700'); 
            newTextEntity.setAttribute('scale', '4 4 4'); 
            newTextEntity.setAttribute('position', '0 1.5 -4'); // تظهر على بعد 4 أمتار أمام الكاميرا

            const sphere = document.createElement('a-sphere');
            sphere.setAttribute('radius', '1.5');
            sphere.setAttribute('material', 'color: #0d6efd; opacity: 0.35; transparent: true;');
            sphere.setAttribute('position', '0 0 -0.1');
            
            newTextEntity.appendChild(sphere);
            container.appendChild(newTextEntity);

            memoryInput.value = '';
            authorInput.value = '';
            
            alert('🎉 رائع! تم إسقاط النص بنجاح. انظر للأمام مباشرة في شاشة هاتفك وستبصر فكرتك تطفو في الغرفة!');
        });
    </script>
</body>
</html>
