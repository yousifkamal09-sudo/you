<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>منصة جغرافيا الخواطر - الغرز الجغرافي</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* الأزرار العائمة فوق الكاميرا */
        .controls-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .action-btn {
            flex: 1;
            background: linear-gradient(135deg, #2c1d11 0%, #110a05 100%);
            color: #d4a373;
            border: 1px solid rgba(212, 163, 115, 0.4);
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* نافذة الأسئلة والغرز عن بعد */
        .panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 12, 8, 0.98);
            z-index: 10000;
            display: none;
            flex-direction: column;
            color: #f5ebe0;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .panel-header h2 {
            color: #d4a373;
            margin: 0;
            font-size: 20px;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 13px;
            color: #d4a373;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(212, 163, 115, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* حاوية الخريطة التكبيرية الدقيقة */
        #map {
            width: 100%;
            height: 220px;
            border-radius: 8px;
            border: 1px solid #d4a373;
            margin-top: 5px;
            z-index: 1;
        }

        .submit-btn {
            background: linear-gradient(90deg, #d4a373, #b58353);
            color: #120c08;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 15px;
            width: 100%;
        }

        .close-panel {
            background: none;
            border: none;
            color: #e63946;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <button class="action-btn" onclick="openPlantPanel()">📍 الغرز عن بُعد</button>
    </div>

    <div id="plant-panel" class="panel">
        <div class="panel-header">
            <h2>غرز ذاكرة في الخريطة</h2>
            <div style="font-size: 12px; color: #b7a89a;">قم باختيار الموقع بدقة من الخريطة واكتب بوحك</div>
        </div>

        <div class="input-group">
            <label>ما اسمك؟</label>
            <input type="text" id="v-name" placeholder="أدخل اسمك الكِريم...">
        </div>

        <div class="input-group">
            <label>كم عمرك؟</label>
            <input type="number" id="v-age" placeholder="أدخل عمرك...">
        </div>

        <div class="input-group">
            <label>هل تعرف يوسف كمال السراج؟</label>
            <select id="v-know">
                <option value="" disabled selected>اختر إجابة...</option>
                <option value="yes">نعم، أعرفه جيداً</option>
                <option value="maybe">سمعت عنه</option>
                <option value="no">لا، لم أتشرف بعد</option>
            </select>
        </div>

        <div class="input-group">
            <label>اكتب خاطرتك المكانية:</label>
            <textarea id="v-thought" placeholder="ماذا تترك في هذا الحيز الجغرافي؟..."></textarea>
        </div>

        <div class="input-group">
            <label>حرك الخريطة واضغط لتحديد موقع الغرز بدقة:</label>
            <div id="map"></div>
            <div id="coords-display" style="font-size: 11px; color: #d4a373; margin-top: 5px; text-align: left;">الإحداثيات المحددة: لم يتم التحديد بعد</div>
        </div>

        <button class="submit-btn" onclick="plantMemory()">✨ إتمام الغرز الجغرافي</button>
        <button class="close-panel" onclick="closePlantPanel()">إلغاء</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false;">
        
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        let map;
        let selectedMarker = null;
        let selectedCoords = null;

        // تهيئة الخريطة التفاعلية عند فتح لوحة الغرز عن بعد
        function initMap() {
            if (map) return; // منع إعادة التهيئة المتكررة
            
            // افتراضياً نفتح الخريطة على إحداثيات متوسطة (يمكن للمستخدم تحريكها لأي مكان)
            map = L.map('map').setView([15.6000, 32.5333], 13); 

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // التقاط النقاط بدقة متناهية عند الضغط على الخريطة
            map.on('click', function(e) {
                let lat = e.latlng.lat;
                let lng = e.latlng.lng;
                selectedCoords = { lat: lat, lng: lng };

                if (selectedMarker) {
                    selectedMarker.setLatLng(e.latlng);
                } else {
                    selectedMarker = L.marker(e.latlng, { draggable: true }).addTo(map);
                }

                document.getElementById('coords-display').innerText = `الإحداثيات المحددة: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            });
        }

        function openPlantPanel() {
            document.getElementById('plant-panel').style.display = 'flex';
            setTimeout(function() {
                initMap();
                map.invalidateSize(); // إعادة ضبط أبعاد الخريطة لتظهر بشكل سليم
            }, 200);
        }

        function closePlantPanel() {
            document.getElementById('plant-panel').style.display = 'none';
        }

        // دالة منسق النصوص البرمجية للـ AR
        function wrapText(text, maxChars) {
            let words = text.split(' ');
            let lines = [];
            let currentLine = '';
            words.forEach(word => {
                if ((currentLine + word).length > maxChars) {
                    lines.push(currentLine.trim());
                    currentLine = word + ' ';
                } else {
                    currentLine += word + ' ';
                }
            });
            lines.push(currentLine.trim());
            return lines.join('\n');
        }

        // دالة غرز الذاكرة وتوليدها في فضاء الواقع المعزز
        function plantMemory() {
            const name = document.getElementById('v-name').value;
            const age = document.getElementById('v-age').value;
            const know = document.getElementById('v-know').value;
            const thought = document.getElementById('v-thought').value;

            if (!name || !age || !know || !thought || !selectedCoords) {
                alert("لطفاً، أكمل البيانات وحدد نقطة الغرز بدقة على الخريطة أولاً.");
                return;
            }

            const formattedThought = wrapText(thought, 24);
            const scene = document.querySelector('a-scene');

            // إنشاء مجسم الـ AR وربطه بالإحداثيات الجغرافية المحددة بدقة
            const entity = document.createElement('a-entity');
            entity.setAttribute('gps-entity-place', `latitude: ${selectedCoords.lat}; longitude: ${selectedCoords.lng};`);
            entity.setAttribute('scale', '3 3 3');

            // لوحة الخلفية الأدبية البنية
            const plane = document.createElement('a-plane');
            plane.setAttribute('color', '#1e120b');
            plane.setAttribute('opacity', '0.95');
            plane.setAttribute('width', '4');
            plane.setAttribute('height', '2.6');
            plane.setAttribute('shader', 'flat');
            entity.appendChild(plane);

            // نص الخاطرة المكتوبة
            const textContent = document.createElement('a-text');
            textContent.setAttribute('value', formattedThought);
            textContent.setAttribute('font', 'https://cdn.aframe.io/fonts/A-Bold.fnt');
            textContent.setAttribute('align', 'center');
            textContent.setAttribute('position', '0 0.4 0.02');
            textContent.setAttribute('width', '3.5');
            textContent.setAttribute('color', '#f5ebe0');
            entity.appendChild(textContent);

            // اسم الكاتب
            const authorText = document.createElement('a-text');
            authorText.setAttribute('value', 'بقلم: ' + name);
            authorText.setAttribute('font', 'https://cdn.aframe.io/fonts/A-Bold.fnt');
            authorText.setAttribute('align', 'center');
            authorText.setAttribute('position', '0 -0.7 0.02');
            authorText.setAttribute('width', '2.5');
            authorText.setAttribute('color', '#e63946');
            entity.appendChild(authorText);

            // إضافة الكيان بالكامل إلى المشهد
            scene.appendChild(entity);

            alert("تم غرز ذاكرتك بنجاح في هذا الحيز الجغرافي! أي شخص يمر من تلك النقطة سيشهد بوحك معلقاً في الفضاء.");
            closePlantPanel();
        }
    </script>
</body>
</html>
