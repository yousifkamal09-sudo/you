<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>جغرافيا الخواطر والذكريات - النسخة الاحترافية الكاملة</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* شاشة البدء والتهيئة الفاخرة */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0f0c1b, #050510);
            color: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.6s ease;
        }
        #splashScreen h1 {
            font-size: 26px;
            color: #ffdf00;
            margin-bottom: 12px;
        }
        #startButton {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }

        /* لوحة التحكم السفلية - بتصميم زجاجي معتم وراقٍ */
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(8, 5, 18, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 10px;
            direction: rtl;
            box-sizing: border-box;
        }
        .input-group input {
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            box-sizing: border-box;
        }

        /* صندوق اختيار المشاعر والألوان */
        .mood-selector {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }
        .mood-btn {
            flex: 1;
            padding: 9px;
            font-size: 13px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .mood-btn.active[data-mood="happy"] { background: #ffc107; color: #000; font-weight: bold; }
        .mood-btn.active[data-mood="nostalgia"] { background: #fd7e14; color: #fff; font-weight: bold; }
        .mood-btn.active[data-mood="idea"] { background: #17a2b8; color: #fff; font-weight: bold; }

        /* أزرار الإجراءات */
        .button-group {
            display: flex;
            gap: 6px;
        }
        #dropButton {
            flex: 3;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        #copyButton {
            flex: 1.5;
            background: linear-gradient(135deg, #17a2b8, #117a8b);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        #clearButton {
            flex: 1.5;
            background: linear-gradient(135deg, #dc3545, #bd2130);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        /* شارات العداد العلوي للموقع */
        .radar-badge {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: #00ffcc;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 999;
            direction: rtl;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        /* تصميم بطاقات النصوص ثنائية الأبعاد النظيفة */
        .ar-text-overlay {
            position: absolute;
            z-index: 900;
            color: #fff;
            background: rgba(5, 4, 10, 0.85);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            pointer-events: auto; /* تمكين اللمس للتحكم بالحجم */
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            direction: rtl;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="radar-badge" id="radar">الذكريات النشطة: 0</div>

    <div id="splashScreen">
        <div style="font-size: 55px; margin-bottom: 10px;">🚀</div>
        <h1>منصة الخواطر والذكريات الاحترافية</h1>
        <p>مرحباً بك في التحديث الشامل: ميزة طفو البالونات، دعم الإيموجي، التحكم بحجم النصوص باللمس، وأداة الحذف الكامل لفضاء نظيف.</p>
        <button id="startButton">دخول فضاء المعاينة</button>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="authorName" placeholder="الاسم المستعار...">
            <input type="text" id="memoryText" placeholder="اكتب خاطرتك أو إيموجي وحيد...">
        </div>
        
        <div class="mood-selector">
            <div class="mood-btn active" data-mood="happy" data-color="#ffc107">فرح 🌟</div>
            <div class="mood-btn" data-mood="nostalgia" data-color="#fd7e14">حنين 🍂</div>
            <div class="mood-btn" data-mood="idea" data-color="#17a2b8">فكرة 💡</div>
        </div>

        <div class="button-group">
            <button id="dropButton">✨ غرس</button>
            <button id="copyButton">🔗 نسخ</button>
            <button id="clearButton">🗑️ حذف الكل</button>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <a-camera id="camera" rotation-reader></a-camera>
        <a-entity id="memoriesContainer"></a-entity>
    </a-scene>

    <div id="labelsOverlay" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:950;"></div>

    <script>
        document.getElementById('startButton').addEventListener('click', () => {
            const splash = document.getElementById('splashScreen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                loadSavedMemories();
            }, 600);
        });

        let selectedColor = "#ffc107"; 
        const moodButtons = document.querySelectorAll('.mood-btn');
        moodButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                moodButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = btn.getAttribute('data-color');
            });
        });

        const dropButton = document.getElementById('dropButton');
        const copyButton = document.getElementById('copyButton');
        const clearButton = document.getElementById('clearButton');
        const memoryInput = document.getElementById('memoryText');
        const authorInput = document.getElementById('authorName');
        const container = document.getElementById('memoriesContainer');
        const labelsOverlay = document.getElementById('labelsOverlay');
        const radar = document.getElementById('radar');

        let memoriesList = [];
        let animationTime = 0;

        copyButton.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('📋 تم نسخ رابط موقعك الاحترافي بنجاح!');
            });
        });

        // زر تفعيل ميزة مسح الفضاء بالكامل وتنظيف الذاكرة المستدامة
        clearButton.addEventListener('click', () => {
            if (confirm('هل أنت متأكد من رغبتك في حذف جميع الذكريات وتنظيف هذا الفضاء بالكامل؟')) {
                localStorage.removeItem('myLocalMemories');
                container.innerHTML = '';
                labelsOverlay.innerHTML = '';
                memoriesList = [];
                radar.innerText = `الذكريات النشطة: 0`;
                alert('🗑️ تم تنظيف الفضاء بنجاح!');
            }
        });

        // دالة إنشاء وعرض عناصر الـ AR المطورة والمتحركة
        function createMemoryElement(text, author, color, pos, customScale = 1) {
            // كشف إذا كان الإدخال مجرد رمز تعبيري (Emoji) لتكبير حجمه بشكل منفصل
            const isEmojiOnly = /^[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}]+$/u.test(text);
            const cleanDisplay = isEmojiOnly ? text : `${text} من قبل ${author}`;

            const sphere = document.createElement('a-sphere');
            sphere.setAttribute('radius', isEmojiOnly ? '0.7' : '1.1');
            sphere.setAttribute('material', `color: ${color}; opacity: 0.38; transparent: true; roughness: 0.15;`);
            sphere.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            container.appendChild(sphere);

            const label = document.createElement('div');
            label.className = 'ar-text-overlay';
            label.innerText = cleanDisplay;
            label.style.borderTop = `3px solid ${color}`;
            if(isEmojiOnly) { label.style.fontSize = '32px'; label.style.background = 'transparent'; label.style.border = 'none'; }
            labelsOverlay.appendChild(label);

            // تفعيل ميزة النقر والتدوير بالفأرة أو العجلة للتحكم في مقياس الحجم (Scale)
            let currentScale = customScale;
            label.addEventListener('wheel', (e) => {
                e.preventDefault();
                currentScale += e.deltaY * -0.001;
                currentScale = Math.min(Math.max(.5, currentScale), 3); // حدود الحجم
                label.style.transform = `translate(-50%, -50%) scale(${currentScale})`;
            });

            memoriesList.push({
                threeDElement: sphere,
                twoDElement: label,
                baseY: pos.y,
                offsetPhase: Math.random() * 100, // مرحلة عشوائية لتفاوت حركة طفو العناصر
                scaleFactor: currentScale
            });

            radar.innerText = `الذكريات النشطة: ${memoriesList.length}`;
        }

        dropButton.addEventListener('click', () => {
            const textValue = memoryInput.value.trim();
            const authorValue = authorInput.value.trim() || 'عابر سبيل';

            if (!textValue) {
                alert('الرجاء كتابة خاطرتك أو اختيار إيموجي أولاً!');
                return;
            }

            const pos = {
                x: (Math.random() - 0.5) * 4.5,
                y: 1.1 + (Math.random() - 0.5) * 1.2,
                z: -3 - (Math.random() * 2)
            };

            createMemoryElement(textValue, authorValue, selectedColor, pos);

            let savedData = JSON.parse(localStorage.getItem('myLocalMemories')) || [];
            savedData.push({ text: textValue, author: authorValue, color: selectedColor, position: pos });
            localStorage.setItem('myLocalMemories', JSON.stringify(savedData));

            memoryInput.value = '';
            authorInput.value = '';
        });

        function loadSavedMemories() {
            let savedData = JSON.parse(localStorage.getItem('myLocalMemories')) || [];
            savedData.forEach(item => {
                createMemoryElement(item.text, item.author, item.color, item.position);
            });
        }

        const cameraEl = document.getElementById('camera');
        
        // الحلقة البرمجية المستمرة: تتبع الزوايا + محاكاة حركات طفو البالونات صعوداً وهبوطاً
        function updateSceneLoop() {
            if (!document.querySelector('a-scene').canvas) {
                requestAnimationFrame(updateSceneLoop);
                return;
            }

            animationTime += 0.02; // سرعة حركة الطفو
            const cameraObj = cameraEl.getObject3D('camera');
            
            memoriesList.forEach(item => {
                // 1. ميزة محاكاة حركة الطفو (Floating Motion) في الإحداثي ثلاثي الأبعاد
                const newY = item.baseY + Math.sin(animationTime + item.offsetPhase) * 0.12;
                const currentPos = item.threeDElement.getAttribute('position');
                item.threeDElement.setAttribute('position', `${currentPos.x} ${newY} ${currentPos.z}`);

                // 2. مزامنة النص ثنائي الأبعاد وربطه بمجسم البالونة المتحرك
                const position = new AFRAME.THREE.Vector3();
                item.threeDElement.object3D.getWorldPosition(position);
                position.project(cameraObj);

                if (position.z <= 1) {
                    const x = (position.x * .5 + .5) * window.innerWidth;
                    const y = (position.y * -.5 + .5) * window.innerHeight;

                    item.twoDElement.style.display = 'block';
                    item.twoDElement.style.left = `${x}px`;
                    item.twoDElement.style.top = `${y - 65}px`;
                    item.twoDElement.style.transform = `translate(-50%, -50%) scale(${item.scaleFactor})`;
                } else {
                    item.twoDElement.style.display = 'none';
                }
            });

            requestAnimationFrame(updateSceneLoop);
        }
        requestAnimationFrame(updateSceneLoop);
    </script>
</body>
</html>
