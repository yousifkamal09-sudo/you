<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>جغرافيا الخواطر - الواقع المعزز</title>
    <!-- مكتبة A-Frame الأساسية للثلاثي الأبعاد -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- مكتبة AR.js للواقع المعزز عبر الكاميرا -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- تنسيقات الشاشة الترحيبية الاحترافية -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');
        
        body, html {
            margin: 0;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background-color: #1a110b;
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2c1d11 0%, #110a05 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f5ebe0;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.8s ease;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 163, 115, 0.2);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #d4a373;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #b7a89a;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 13px;
            color: #d4a373;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d4a373;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #e63946;
        }

        button {
            background-color: #d4a373;
            color: #2c1d11;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background-color: #e63946;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- الشاشة الترحيبية والأسئلة -->
    <div id="welcome-screen">
        <div class="welcome-card">
            <h1>مرحباً بك في جغرافيا الخواطر</h1>
            <p>أهلاً بك في فضاء يدمج الكلمة بالمكان.. يرجى الإجابة لتجربة مخصصة:</p>
            
            <!-- السؤال الأول -->
            <div class="input-group">
                <label for="visitor-name">ما اسمك؟</label>
                <input type="text" id="visitor-name" placeholder="اكتب اسمك هنا...">
            </div>

            <!-- السؤال الثاني -->
            <div class="input-group">
                <label for="visitor-age">كم عمرك?</label>
                <input type="number" id="visitor-age" placeholder="اكتب عمرك...">
            </div>

            <!-- السؤال الثالث -->
            <div class="input-group">
                <label for="know-youssef">هل تعرف يوسف كمال السراج؟</label>
                <select id="know-youssef">
                    <option value="" disabled selected>اختر إجابة...</option>
                    <option value="yes">نعم، أعرفه جيداً</option>
                    <option value="maybe">سمعت عنه</option>
                    <option value="no">لا، لم أتشرف بعد</option>
                </select>
            </div>

            <button onclick="startARExperience()">دخول إلى فضاء الخواطر</button>
        </div>
    </div>

    <!-- مشهد الواقع المعزز (يظهر بعد تخطي الأسئلة) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker-camera preset="hiro">
            
            <a-entity position="0 1 0" rotation="-90 0 0" scale="1 1 1">
                
                <!-- صندوق الخلفية الأنيق -->
                <a-plane color="#231711" opacity="0.9" width="3.8" height="2.2" radius="0.15" shader="flat"></a-plane>

                <!-- نص الخاطرة مقسم على أسطر -->
                <a-text 
                    value="هنا في أزقة المدينة العتيقة،\nتركتُ نصف قلبي ونصف أغنية،\nوما زال صدى الراحلين يملأ المكان." 
                    font="https://cdn.aframe.io/fonts/A-Bold.fnt" 
                    align="center" 
                    position="0 0.35 0.02" 
                    width="3.4" 
                    color="#f5ebe0"
                    wrap-count="28">
                </a-text>

                <!-- خط فاصل رفيع -->
                <a-plane color="#d4a373" width="3.0" height="0.015" position="0 -0.25 0.03"></a-plane>

                <!-- اسم الكاتب -->
                <a-text 
                    value="بقلم: يوسف كمال" 
                    font="https://cdn.aframe.io/fonts/A-Bold.fnt" 
                    align="center" 
                    position="0 -0.55 0.02" 
                    width="2.4" 
                    color="#e63946">
                </a-text>

            </a-entity>

        </a-marker-camera>

        <a-entity camera></a-entity>

    </a-scene>

    <!-- التحكم البرمجي بإخفاء شاشة الأسئلة -->
    <script>
        function startARExperience() {
            var name = document.getElementById('visitor-name').value;
            var age = document.getElementById('visitor-age').value;
            var know = document.getElementById('know-youssef').value;

            // التحقق من أن الزائر أجاب على الأسئلة
            if(name === "" || age === "" || know === "") {
                alert("لطفاً، أكمل الإجابات أولاً لنفتح لك بوابة الخواطر.");
                return;
            }

            // إخفاء الشاشة الترحيبية بملامح سلسة للبدء في تشغيل الكاميرا والـ AR
            var welcomeScreen = document.getElementById('welcome-screen');
            welcomeScreen.style.opacity = '0';
            setTimeout(function() {
                welcomeScreen.style.display = 'none';
            }, 800);
        }
    </script>

</body>
</html>
