<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>جغرافيا الأفكار والذكريات المطورة</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* شاشة البدء الترحيبية */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #12122c, #08081a);
            color: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.6s ease;
        }
        #splashScreen h1 {
            font-size: 26px;
            color: #ffdf00;
            margin-bottom: 12px;
        }
        #startButton {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }

        /* لوحة التحكم السفلية المتطورة */
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(10, 8, 22, 0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 10px;
            direction: rtl;
            box-sizing: border-box;
        }
        .input-group input {
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            box-sizing: border-box;
        }

        /* خيارات اختيار المشاعر والألوان */
        .mood-selector {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }
        .mood-btn {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            text-align: center;
        }
        .mood-btn.active[data-mood="happy"] { background: #ffc107; color: #000; font-weight: bold; }
        .mood-btn.active[data-mood="nostalgia"] { background: #fd7e14; color: #fff; font-weight: bold; }
        .mood-btn.active[data-mood="idea"] { background: #17a2b8; color: #fff; font-weight: bold; }

        .button-group {
            display: flex;
            gap: 8px;
        }
        #dropButton {
            flex: 2;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        #copyButton {
            flex: 1;
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        /* رادار إحصائي صغير في الأعلى */
        .radar-badge {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ffcc;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 999;
            direction: rtl;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }

        /* نافذة النصوص ثنائية الأبعاد الذكية الطافية فوق العناصر ثلاثية الأبعاد */
        .ar-text-overlay {
            position: absolute;
            z-index: 900;
            color: #fff;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%);
            direction: rtl;
        }
    </style>
</head>
<body>

    <div class="radar-badge" id="radar">الذكريات النشطة: 0</div>

    <div id="splashScreen">
        <div style="font-size: 55px; margin-bottom: 10px;">🌟</div>
        <h1>جغرافيا المشاعر والخواطر</h1>
        <p>تم تحديث النظام ليدعم الخط العربي النقي وصندوق المشاعر الملونة التفاعلي داخل مكانك الحالي.</p>
        <button id="startButton">دخول المعاينة</button>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="authorName" placeholder="الاسم المستعار...">
            <input type="text" id="memoryText" placeholder="اكتب خاطرتك هنا بدون أي رموز أو أقواس...">
        </div>
        
        <div class="mood-selector">
            <div class="mood-btn active" data-mood="happy" data-color="#ffc107">فرح 🌟</div>
            <div class="mood-btn" data-mood="nostalgia" data-color="#fd7e14">حنين 🍂</div>
            <div class="mood-btn" data-mood="idea" data-color="#17a2b8">فكرة 💡</div>
        </div>

        <div class="button-group">
            <button id="dropButton">✨ غرس فوري</button>
            <button id="copyButton">🔗 نسخ</button>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        
        <a-camera id="camera" rotation-reader></a-camera>
        <a-entity id="memoriesContainer"></a-entity>

    </a-scene>

    <div id="labelsOverlay" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:950;"></div>

    <script>
        // تفعيل شاشة البدء
        document.getElementById('startButton').addEventListener('click', () => {
            const splash = document.getElementById('splashScreen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 600);
        });

        // إدارة أزرار المشاعر والألوان
        let selectedColor = "#ffc107"; 
        const moodButtons = document.querySelectorAll('.mood-btn');
        moodButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                moodButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = btn.getAttribute('data-color');
            });
        });

        const dropButton = document.getElementById('dropButton');
        const copyButton = document.getElementById('copyButton');
        const memoryInput = document.getElementById('memoryText');
        const authorInput = document.getElementById('authorName');
        const container = document.getElementById('memoriesContainer');
        const labelsOverlay = document.getElementById('labelsOverlay');
        const radar = document.getElementById('radar');

        let memoriesList = [];
        let memoryCount = 0;

        // ميزة نسخ الرابط الاحتياطية الآمنة
        copyButton.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('📋 تم نسخ رابط موقعك بنجاح!');
            });
        });

        // ميزة غرس الذكرى
        dropButton.addEventListener('click', () => {
            const textValue = memoryInput.value.trim();
            const authorValue = authorInput.value.trim() || 'عابر سبيل';

            if (!textValue) {
                alert('الرجاء كتابة النص أولاً!');
                return;
            }

            // صياغة النص النقي تماماً بدون علامات تنصيص أو أقواس
            const cleanText = textValue + " من قبل " + authorValue;

            memoryCount++;
            radar.innerText = `الذكريات النشطة: ${memoryCount}`;

            // 1. إنشاء فقاعة ملونة تفاعلية في الخلفية ثلاثية الأبعاد ثلاثية الأبعاد
            const sphere = document.createElement('a-sphere');
            sphere.setAttribute('radius', '1.1');
            sphere.setAttribute('material', `color: ${selectedColor}; opacity: 0.4; transparent: true; roughness: 0.1;`);
            
            // توزيع الفقاعات في زوايا عشوائية خفيفة أمام المستخدم (بين 3 إلى 5 أمتار عمق)
            const randomX = (Math.random() - 0.5) * 4;
            const randomY = 1.2 + (Math.random() - 0.5) * 1.5;
            const randomZ = -3 - (Math.random() * 2);
            
            sphere.setAttribute('position', `${randomX} ${randomY} ${randomZ}`);
            container.appendChild(sphere);

            // 2. إنشاء بطاقة النص ثنائية الأبعاد (2D Overlay) لمنع مشاكل الخط العربي
            const label = document.createElement('div');
            label.className = 'ar-text-overlay';
            label.innerText = cleanText; // نص نقي تماماً بدون أي علامات ترميز
            label.style.borderTop = `3px solid ${selectedColor}`;
            labelsOverlay.appendChild(label);

            // حفظ بيانات العنصر لتحديث مكانه بالتزامن مع حركة الكاميرا
            memoriesList.push({
                threeDElement: sphere,
                twoDElement: label
            });

            memoryInput.value = '';
            authorInput.value = '';
        });

        // حلقة برمجية مستمرة لربط حركة بطاقات النصوص ثنائية الأبعاد بمواقع الفقاعات أثناء تحرك الكاميرا
        const sceneEl = document.querySelector('a-scene');
        const cameraEl = document.getElementById('camera');

        function updateLabels() {
            if (!sceneEl.canvas) {
                requestAnimationFrame(updateLabels);
                return;
            }

            const cameraObj = cameraEl.getObject3D('camera');
            
            memoriesList.forEach(item => {
                const position = new AFRAME.THREE.Vector3();
                item.threeDElement.object3D.getWorldPosition(position);

                // تحويل الإحداثيات ثلاثية الأبعاد إلى إحداثيات شاشة ثنائية الأبعاد (X, Y)
                position.project(cameraObj);

                // التحقق مما إذا كانت الفقاعة تقع في مجال رؤية الكاميرا الحالي أم خلفها
                if (position.z <= 1) {
                    const x = (position.x * .5 + .5) * window.innerWidth;
                    const y = (position.y * -.5 + .5) * window.innerHeight;

                    item.twoDElement.style.display = 'block';
                    item.twoDElement.style.left = `${x}px`;
                    item.twoDElement.style.top = `${y - 60}px`; // رفع النص قليلاً فوق الفقاعة لمنع التداخل
                } else {
                    item.twoDElement.style.display = 'none';
                }
            });

            requestAnimationFrame(updateLabels);
        }
        
        requestAnimationFrame(updateLabels);
    </script>
</body>
</html>
