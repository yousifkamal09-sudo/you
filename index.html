<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>منصة جغرافيا الخواطر - البث المباشر</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* الكاميرا الخلفية الحية - تعمل كخلفية أساسية للموقع */
        #webcam-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* اللوحة ثلاثية الأبعاد العائمة التي تعرض الخاطرة فوق الكاميرا */
        #ar-overlay-card {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            background: rgba(30, 18, 11, 0.95);
            border: 2px solid #d4a373;
            border-radius: 15px;
            padding: 20px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            display: none;
            color: #f5ebe0;
        }

        #ar-overlay-card p {
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 15px 0;
            word-wrap: break-word;
        }

        #ar-overlay-card .author {
            color: #e63946;
            font-weight: bold;
            font-size: 14px;
        }

        /* زر الغرز العائم أسفل الشاشة */
        .controls-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
            max-width: 400px;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #2c1d11 0%, #110a05 100%);
            color: #d4a373;
            border: 1px solid rgba(212, 163, 115, 0.6);
            padding: 16px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }

        /* نافذة الغرز عن بعد والخريطة */
        .panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 12, 8, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            color: #f5ebe0;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-header h2 {
            color: #d4a373;
            margin: 0 0 5px 0;
            font-size: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 13px;
            color: #d4a373;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(212, 163, 115, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            font-size: 14px;
        }

        #map {
            width: 100%;
            height: 250px;
            border-radius: 8px;
            border: 1px solid #d4a373;
            margin-top: 5px;
        }

        .submit-btn {
            background: linear-gradient(90deg, #d4a373, #b58353);
            color: #120c08;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 15px;
            width: 100%;
        }

        .close-panel {
            background: none;
            border: none;
            color: #e63946;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <video id="webcam-video" autoplay playsinline muted></video>

    <div id="ar-overlay-card">
        <p id="ar-text-view"></p>
        <div style="width: 80%; height: 1px; background: #d4a373; margin: 10px auto;"></div>
        <div id="ar-author-view" class="author"></div>
    </div>

    <div class="controls-container">
        <button class="action-btn" onclick="openPlantPanel()">📍 خيار الغرز عن بُعد</button>
    </div>

    <div id="plant-panel" class="panel">
        <div class="panel-header">
            <h2>الغرز عن بُعد (خرائط القمر الصناعي)</h2>
            <div style="font-size: 12px; color: #b7a89a; text-align: center; margin-bottom: 15px;">حدد المبنى بدقة واغرز خاطرتك</div>
        </div>

        <div class="input-group">
            <label>ما اسمك؟</label>
            <input type="text" id="v-name" placeholder="أدخل اسمك الكريم...">
        </div>

        <div class="input-group">
            <label>كم عمرك؟</label>
            <input type="number" id="v-age" placeholder="أدخل عمرك...">
        </div>

        <div class="input-group">
            <label>هل تعرف يوسف كمال السراج؟</label>
            <select id="v-know">
                <option value="" disabled selected>اختر إجابة...</option>
                <option value="yes">نعم، أعرفه جيداً</option>
                <option value="maybe">سمعت عنه</option>
                <option value="no">لا، لم أتشرف بعد</option>
            </select>
        </div>

        <div class="input-group">
            <label>اكتب خاطرتك المكانية:</label>
            <textarea id="v-thought" placeholder="ماذا تترك في هذا الحيز من ذاكرة؟..."></textarea>
        </div>

        <div class="input-group">
            <label>كبّر الخريطة واضغط على المبنى بدقة عالية للغرز:</label>
            <div id="map"></div>
            <div id="coords-display" style="font-size: 11px; color: #d4a373; margin-top: 6px; text-align: right;">الموقع: اضغط لتحديد مكان المبنى المطلوب</div>
        </div>

        <button class="submit-btn" onclick="plantMemory()">✨ إتمام الغرز الجغرافي للمبنى</button>
        <button class="close-panel" onclick="closePlantPanel()">إلغاء والعودة للكاميرا</button>
    </div>

    <script>
        let map;
        let selectedMarker = null;
        let selectedCoords = null;

        // دالة تشغيل الكاميرا الخلفية الأصلية والمستقرة 100% فور فتح الموقع
        function startWebcam() {
            const video = document.getElementById('webcam-video');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } // إجبار الكاميرا الخلفية
                })
                .then(function(stream) {
                    video.srcObject = stream;
                })
                .catch(function(error) {
                    // حل احتياطي في حال فشل الإجبار الصارم (مثل العمل على الكمبيوتر للتجربة)
                    navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) {
                        video.srcObject = stream;
                    });
                });
            }
        }

        // تشغيل الكاميرا تلقائياً فور تحميل الصفحة
        window.addEventListener('DOMContentLoaded', startWebcam);

        // تهيئة خريطة الأقمار الصناعية عالية الدقة لعرض المباني والبيوت بالتكبير
        function initMap() {
            if (map) return; 
            
            // تهيئة الخريطة على إحداثيات متوسطة تقريبية
            map = L.map('map').setView([15.6000, 32.5333], 16); 

            // سيرفر خرائط Esri بالأقمار الصناعية لعرض تفاصيل المباني الحقيقية بدقة متناهية
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'Esri World Imagery'
            }).addTo(map);

            map.on('click', function(e) {
                let lat = e.latlng.lat;
                let lng = e.latlng.lng;
                selectedCoords = { lat: lat, lng: lng };

                if (selectedMarker) {
                    selectedMarker.setLatLng(e.latlng);
                } else {
                    selectedMarker = L.marker(e.latlng).addTo(map);
                }

                document.getElementById('coords-display').innerText = `تم تحديد موقع المبنى بدقة بنجاح.`;
            });
        }

        function openPlantPanel() {
            document.getElementById('plant-panel').style.display = 'flex';
            setTimeout(function() {
                initMap();
                map.invalidateSize();
            }, 250);
        }

        function closePlantPanel() {
            document.getElementById('plant-panel').style.display = 'none';
        }

        function plantMemory() {
            const name = document.getElementById('v-name').value;
            const age = document.getElementById('v-age').value;
            const know = document.getElementById('v-know').value;
            const thought = document.getElementById('v-thought').value;

            if (!name || !age || !know || !thought || !selectedCoords) {
                alert("لطفاً، أكمل جميع الإجابات وحدد المبنى بدقة بالضغط على الخريطة أولاً.");
                return;
            }

            // عرض لوحة الخاطرة الأدبية بشكل فخم فوق الكاميرا الخلفية مباشرة مع اسم الكاتب
            document.getElementById('ar-text-view').innerText = thought;
            document.getElementById('ar-author-view').innerText = 'بقلم: ' + name;
            
            document.getElementById('ar-overlay-card').style.display = 'block';

            alert("تم الغرز عن بُعد بنجاح للمبنى المختار ومزامنة الخاطرة في الفضاء الجغرافي!");
            closePlantPanel();
        }
    </script>
</body>
</html>
